<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Example</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Embedded CSS -->
    <style>
        body {
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">Rohit Sharma </h1>
    
     <div class="div1">
        <p>This paragraph is inside a div with class "div1".</p>
     </div>
     <div class="div2">
        <p>This paragraph is inside a div with class "div2".</p>
     </div>
    <h2 class="header">About Us</h2>

    <p class="content">
        This paragraph uses styles from the external stylesheet.
    </p>

</body>
</html>
