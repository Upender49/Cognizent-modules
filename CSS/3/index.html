<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Example</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Embedded CSS -->
    <style>
        body {
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div id="mainsection">
        <h1 class="header">Hello, World!</h1>
        <p> it is the main section for id selector</p>
    </div>
    <div class="eventCard">
        <h2>Event Title</h2>
        <p>Event details go here.</p>
        <p> it is for class selector event card 1</p>
    </div>
    <div class="eventCard">
        <h2>Event Title</h2>
        <p>Event details go here.</p>
        <h3> it is for class selector event card 2</h3>
    </div>
    <!-- Inline CSS -->
    <h1 style="color: red;">Welcome to My Website</h1>

    <h2>H2 Element </h2>

    <p class="content">
        This paragraph uses styles from the external stylesheet.
    </p>

</body>
</html>
